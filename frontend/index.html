<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ProjectFlow — Modern project management platform with task tracking, team collaboration, and role-based access control.">
  <title>ProjectFlow — Project Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Auth Page -->
  <div id="page-auth" class="page active">
    <div class="auth-wrapper">
      <div class="auth-brand">
        <div class="brand-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <defs>
              <linearGradient id="brand-grad" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
            <rect width="40" height="40" rx="12" fill="url(#brand-grad)"/>
            <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="brand-name">ProjectFlow</h1>
        <p class="brand-tagline">Manage projects. Track progress. Deliver results.</p>
      </div>
      <div class="auth-card glass-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" id="tab-login">Log In</button>
          <button class="auth-tab" data-tab="signup" id="tab-signup">Sign Up</button>
        </div>
        <!-- Login Form -->
        <form id="form-login" class="auth-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="btn-login">
            <span>Log In</span>
            <span class="btn-loader hidden"></span>
          </button>
        </form>
        <!-- Signup Form -->
        <form id="form-signup" class="auth-form hidden">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="btn-signup">
            <span>Create Account</span>
            <span class="btn-loader hidden"></span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app-shell" class="hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
          <defs>
            <linearGradient id="sb-grad" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
          <rect width="40" height="40" rx="12" fill="url(#sb-grad)"/>
          <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>ProjectFlow</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-page="projects" id="nav-projects">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span>Projects</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-sm" id="btn-seed" title="Seed Demo Data" style="padding:4px; font-size:10px; opacity:0.5;">🌱 Seed Demo</button>
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">JD</div>
          <div class="user-details">
            <span class="user-name" id="user-name">User</span>
            <span class="user-email" id="user-email">user@email.com</span>
          </div>
        </div>
        <button class="btn-icon" id="btn-logout" title="Log out">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Top Bar -->
      <header class="topbar">
        <button class="btn-icon sidebar-toggle" id="sidebar-toggle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 id="page-title" class="topbar-title">Dashboard</h2>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>

      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page-content active">
        <div id="dashboard-content" class="dashboard-grid">
          <div class="skeleton-loader">Loading dashboard...</div>
        </div>
      </div>

      <!-- Projects Page -->
      <div id="page-projects" class="page-content">
        <div id="projects-content" class="projects-grid">
          <div class="skeleton-loader">Loading projects...</div>
        </div>
      </div>

      <!-- Project Detail Page -->
      <div id="page-project-detail" class="page-content">
        <div id="project-detail-content">
          <div class="skeleton-loader">Loading project...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modals -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal glass-card" id="modal-container">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="btn-icon modal-close" id="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
